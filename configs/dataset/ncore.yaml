type: ncore

# Camera sensors to use
# Leave null to auto-detect single available camera - needs to be specified explicitly
# in case of multiple camera sensors:
#   camera_ids: [camera_front_wide_120fov, camera_cross_left_120fov, camera_cross_right_120fov]
camera_ids: null  # Null = auto-select single camera sensor

# A2 — cuboid pose ↔ camera frame time matching for dynamic_rigids tracks:
#   ref_nearest       (default) ref-camera END timestamps + nearest-obs snap
#                     (legacy, byte-identical to pre-A2 behaviour)
#   per_camera_interp union of ALL training cameras' END timestamps + lerp/slerp
#                     pose interpolation — removes the ~100ms cross-camera skew
cuboid_ts_mode: ref_nearest

# Point-cloud source IDs for initialization.
# Accepts lidar IDs, radar IDs, or native point cloud IDs (e.g., "sfm_points").
# null = auto-detect all available sources.
lidar_ids: null

# V4 component group names (only used when loading NCore V4 datasets)
poses_component_group: default
intrinsics_component_group: default
masks_component_group: default

# Validation rendering frequency
val_frequency: 100

# Image downsampling for training
# downsample: 0.5 means half resolution (1920x1280 -> 960x640)
downsample: 1.0

# JPEG decoding backend and options
# "simplejpeg" uses libjpeg-turbo for faster decoding; "PIL" is the fallback
jpeg_backend_cpu: simplejpeg
simplejpeg_fastdct: false        # ~4-5% faster decode, minor quality loss
simplejpeg_fastupsample: false   # ~4-5% faster chroma upsampling, minor quality loss

# Image subsampling for validation (must evenly divide all camera resolutions)
# Note: Set to 1 to use full resolution
# Additional subsampling beyond downsample is typically not needed
n_val_image_subsample: 1

# Frame-level train/val split (like COLMAP)
# Every Nth frame is validation, rest are training
# This distributes validation frames throughout the trajectory
val_frame_interval: 8  # Every 8th frame is validation (12.5% val, 87.5% train)

# Property name to retrieve lidar point RGB colors from (if available)
lidar_color_generic_data_name: rgb

# PIN-MASK-1: forward-valid supervision mask from camera_rays_to_pixels().
# When true, masks out pixels where the rational-polynomial forward projection
# produces an invalid flag (OpenCVPinholeCameraModel only).  Default false
# ensures existing run configs are byte-identical. This legacy SDK-domain mask
# is mutually exclusive with opencv_pinhole_use_validity_domain=true.
mask_forward_invalid_pixels: false

# PIN-CAM-1: OpenCV rational pixel-to-ray inverse convergence iterations.
# NCore SDK hard-codes 10, which leaves wide-camera peripheral rays several
# pixels from the forward solution. 30 reduces b6a9 front-wide max residual
# below 0.02 px. Set 10 only for legacy reproduction.
opencv_pinhole_inverse_iterations: 30
# PIN-CAM-1c: certify the rational forward domain over the image plus the
# same fractional margin used by 3DGUT's UT projection.
opencv_pinhole_validity_margin: 0.1
# PIN-CAM-1c: enable calibrated OpenCV rational validity domain certificates.
# When false, omit max_valid_r2 so the CUDA projector keeps the legacy
# 0.8 < icD < 1.2 gate. Inverse-iteration fixes remain independent. Do not
# combine true with mask_forward_invalid_pixels=true: that mask uses the SDK's
# legacy gate and would discard the calibrated periphery restored here.
opencv_pinhole_use_validity_domain: true
# Training parameters
train:
  window_size: 256  # Not used when sample_full_image=true (full images used)
  seek_offset_sec: 0.0
  duration_sec: -1  # -1 or 0 = use all available frames; 10.0 = first 10 seconds; None = all frames
  sample_full_image: true  # Train on full images (downsampled by downsample factor above)
  n_samples_per_epoch: 1000
  n_train_sample_timepoints: 1
  n_train_sample_camera_rays: 4096  # Overridden to w*h when sample_full_image=true
  
  ray_jittering:
    start_iteration: 0
    apply_every_n_iterations: true
    type: none

# Validation parameters
# CRITICAL: Validation uses every Nth frame (distributed throughout trajectory)
# Training randomly samples from non-validation frames
val:
  seek_offset_sec: 0.0
  duration_sec: -1  # -1 = use all available frames in the dataset
