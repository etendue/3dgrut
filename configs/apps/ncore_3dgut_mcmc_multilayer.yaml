# @package _global_
#
# ===========================================================================
#  NCore 3DGUT MCMC Multi-Layer — 单文件扁平配置 (2026-05-26)
#  ★ v3 baseline (2026-06-03 重生): R2 bg_road_penalty + Phase2A road-opacity
#    豁免 + BilateralGrid exposure + LiDAR depth (生效配方 λ0.1/decay0);
#    eff_rank 剔除 (null 噪声). 详见 v3_plan.md Done Log "v3 baseline 重生".
# ===========================================================================
# 本 yaml 是 ncore_3dgut_mcmc_v2_full_4dviz_dynfix.yaml 7 层递归链的
# 字节等价扁平版, 把以下链路上所有 override 合并进一份文件:
#
#   dynfix → 4dviz → exposure → sky → full → road → ncore_3dgut_mcmc
#
# 启用的 v2 能力 (= dynfix 全部):
#   * LayeredGaussians + LayeredMCMCStrategy
#   * 4 个 layer: background / road / dynamic_rigids / sky_envmap
#   * region-weighted L1 (trainer.layered_loss)
#   * sky envmap (默认 cubemap; A800 必须 CLI 加 trainer.sky_backend=mlp)
#   * per-camera affine exposure (use_exposure=true) — 实现已由 V3-P1 (T9.x)
#     从旧 ExposureModel 替换为 BilateralGrid: raw psnr 15.29→27.44 (+12dB),
#     raw/cc 差 10.75→1.21dB. ⚠ 旧"复跑 baseline 关 use_exposure"建议已作废,
#     v3 baseline 保持 ON.
#   * 4D viz metadata 入 ckpt (viz_4d.enabled=true)
#   * T8/B3: bg-layer cuboid 内 opacity penalty + cuboid mask + dyn 位置 clamp
#   * dynamic_rigids.max_n_particles 调到 300k (= dynfix)
#   * MCMC relocate 单步上限 0.4 (= dynfix)
#
# Acceptance gate (1k smoke / 5k full smoke 同 dynfix):
#   - exit 0; ckpt['viz_4d'] present
#   - bg_dyn_cuboid_penalty enabled = true 在训练日志可见
#   - layers.enabled = [background, road, dynamic_rigids, sky_envmap]
#   - dynamic_rigids LayerSpec.max_n_particles = 300000
# ===========================================================================

defaults:
  - /base_mcmc
  - /dataset: ncore
  - /initialization: lidar
  - /render: 3dgut
  - override /strategy: layered_mcmc
  - _self_

# ─── 根级 (源自 ncore_3dgut_mcmc.yaml) ───────────────────────────────────
val_frequency: 999999  # never validate during training; rely on render.py post-eval

initialization:
  use_observation_points: false

# ─── v2 layered model 开关 (源自 v2_road.yaml) ─────────────────────────
use_layered_model: true
layers:
  # 4 层: 来自 v2_sky.yaml (扩展自 v2_road.yaml [bg,road] 和 v2_full.yaml [+dyn])
  enabled: [background, road, dynamic_rigids, sky_envmap]
  # T8/B3 dynfix: dyn 层最大粒子数 200k → 300k
  overrides:
    dynamic_rigids:
      max_n_particles: 300000

      # ─── V3-L5 symmetric_axis (NuRec ``symmetric_axis`` 对称对象初始化) ─
      # 'Y' = 车辆左右对称 (NuRec default for sedan/truck/bus). LiDAR 在
      # object-local frame 的点云 y 取负后 concat 到原集合 (subsample
      # cap=5000 前), 等价于把对称车辆"看不到的另一侧"的 LiDAR 点补回去.
      # 'X' / 'Z' 也支持但很少用 (X=纵向对称, Z=垂直对称).
      # ``null`` (default) = OFF, baseline byte-identical.
      #
      # 5k vast smoke (非对称 5cam, 早期 baseline) 实测信号:
      #   heavy_truck_psnr +0.146 / bus_psnr +0.149 / class_psnr_n_low_15db -13%
      # 30k A800 (对称 5cam) 全开 (含 V3-L8/L9) 实测有反转 — symmetric_axis
      # 单独 ablation 30k 待跑 (V3-L5b follow-up).
      #
      # CLI override: ``++layers.overrides.dynamic_rigids.symmetric_axis=Y``
      symmetric_axis: null

      # ─── V3-L8/L9 per-track albedo / scale (EXPERIMENTAL, 30k 有副作用) ─
      # 每 track 学一个 3-dim RGB bias (L8) + scalar log-scale offset (L9)
      # 加到 features_albedo DC SH / scale (log-space). NuRec 原文用 LR 1e-5
      # SequentialLR (Constant->Linear->Cosine), 我们简化为 fixed lr +
      # requires_grad warmup gate.
      #
      # ⚠️ 30k 全开实测有副作用 (mean_class_psnr -0.12 dB, n_low_15db +21%):
      # warmup=500 + cosine lr=1e-5 + 29500 步累积量过大, per-track offset
      # 学过头让 dyn 层稳定性受损. 单独激活 albedo / scale 的 ablation 待跑.
      # 建议: 暂时保持 OFF, 或调 warmup_steps>=5000 / lr<=1e-6 后再 ablation.
      optimize_track_albedo: false
      optimize_track_scale: false
      # 共享 warmup: requires_grad 在 global_step >= track_warmup_steps 翻转
      track_warmup_steps: 500
      track_albedo_lr: 1.0e-5
      track_scale_lr: 1.0e-5

# ─── 数据集 (T8.5.7 / V3-E4 切到对称 5-cam ring) ────────────────────────
dataset:
  load_aux_masks: true   # T3.1.b: sseg + lidar-sseg readers (v2_road)

  # ── Stage 11 (T11): image-space depth supervision inputs (默认 OFF, opt-in) ──
  # 读 scripts/dump_lidar_depth_map.py / dump_depth_priors.py 预 dump 的
  # 每帧深度图 (aux/lidar_depth/ + aux/depth_anything_v2/) 注入
  # image_infos["lidar_depth_map"] / ["depth_prior"]. train/val/test 三路均接.
  # 配合 trainer.use_lidar_depth / use_depth_prior 使用; 任一为 true 时打开对应项.
  # Stage 11 30k 实测 (sym5cam): 接通正确, reconstructed 不退化, novel-view
  # 无稳健提升 (LiDAR-only LPIPS -0.0045 噪声级), 但 lidar_psnr +2dB 几何精度.
  # ★ v3 baseline 纳入 LiDAR (不纳 DepthV2). 详见 v3_plan.md Done Log Stage 11.
  load_lidar_depth_map: true    # ★ v3 baseline ON: <clip>/aux/lidar_depth/<cam>/<ts>.npz (4196 npz dump 已存在)
  load_depth_prior: false       # DepthV2 不纳入 (z/ray 口径 bug 未修 + 噪声级)
  lidar_depth_aux_root: null    # null → <clip_dir>/aux/lidar_depth
  depth_prior_aux_root: null    # null → <clip_dir>/aux/depth_anything_v2
  # 对称 5-cam ring (T8.5.7 / V3-E4 30k 实测): front_wide_120 + 左右 cross
  # 120 + 左右 rear 70, 完整 360° 环视且左右对称. 历史非对称 5-cam 用
  # rear_tele_30 (单后向窄视角) 替代 rear_right_70, 30k 实测在 4 个公共
  # 相机上 cc_psnr_masked 平均比对称 5-cam 低 -2.05 dB, 单独 rear-back
  # 相机自身相差 +5.2 dB (rear_right_70 27.78 vs rear_tele_30 22.56).
  # 7-cam 训练 (额外加 rear_tele_30 + front_tele_30) 30k 实测在 4 个公共
  # 相机上 cc_psnr_masked 比对称 5-cam 平均低 -0.42 dB, 多相机摊薄训练量
  # 没补回视角约束增益. 7-cam 跑 ablation 时 CLI 覆盖 camera_ids 列表.
  # 详见 v3_plan.md § 5 Done Log 2026-05-27 V3-E4 条目.
  camera_ids:
    - camera_front_wide_120fov
    - camera_cross_left_120fov
    - camera_cross_right_120fov
    - camera_rear_left_70fov
    - camera_rear_right_70fov

# ─── loss (Phase 2A Fix v1) ──────────────────────────────────────────
loss:
  # Phase 2A Fix v1: exempt the road layer from the opacity L1 decay
  # (lambda_opacity). Stops under-supervised road particles from being
  # starved → killed → relocated/perturb-flung off the LiDAR surface → BEV
  # road holes. 30k A/B (commit e457648): road dead 29.1%→0.2%, opaque
  # coverage @0.1 82→93% / @0.3 71→88%, combined BEV hole 6%→2%, at −0.18 dB
  # cc_psnr (≈ run-to-run noise). User-accepted 2026-06-02.
  # Set to [] to disable (revert to byte-identical baseline).
  exempt_layers_opacity_reg: [road]

# ─── trainer (汇总所有上游 v2 yaml) ────────────────────────────────────
trainer:
  layered_loss: true       # v2_road: region-weighted L1
  use_sky_envmap: true     # v2_sky
  lambda_sky: 0.1          # v2_sky
  # sky_backend / sky_resolution 保持 null (registry default = cubemap@128);
  # A800 nvdiffrast 不可用 → CLI 加 trainer.sky_backend=mlp

  # v2_full_exposure: per-camera affine exposure → V3-P1 已替换为 BilateralGrid
  # (threedgrut/correction/bilateral_grid.py). raw/cc 差降至 1.21dB (健康).
  # ablation 关闭: CLI 加 trainer.use_exposure=false
  use_exposure: true
  exposure_lr: 1.0e-3

  # ── Stage 11 (T11): LiDAR + DepthAnythingV2 depth supervision (默认 OFF) ──
  # 三个 image-space depth loss head (threedgrut/correction/depth_prior.py):
  #   lidar_depth  — LiDAR 投影稀疏 ray-depth, L1+normalize, λ 带 drivestudio
  #                  指数衰减 (lidar_w_decay > 0 → λ_eff=λ*exp(-step/8000*decay))
  #   bg_lidar     — sky 区域远场 anchor (MSE→max_depth), 防 sky 高斯坍缩
  #   depth_prior  — DepthV2 稠密 metric depth, L2+inverse-depth
  # 配合 dataset.load_lidar_depth_map / load_depth_prior (上面) + 预 dump 深度图.
  # ⚠ Stage 11 30k 实测结论: 实现正确、reconstructed 不退化, 但 novel-view
  #   无可观测提升 (LPIPS Δ-0.0015). 疑因 lidar_w_decay 衰减 + inverse-depth
  #   早饱和使监督在训练中途消失 + 30k/5cam RGB 信号已 pin 住几何. 调参方向:
  #   lidar_w_decay=0 (全程监督) + 提 λ_depth_prior + depth_prior 换不饱和 loss.
  #   详见 v3_plan.md § 5 Done Log 2026-05-30 Stage 11 条目.
  use_lidar_depth: true       # ★ v3 baseline ON: LiDAR ray-depth + bg_lidar (用户决策 2026-06-03)
  use_depth_prior: false      # DepthV2 不纳入 (z/ray 口径 bug + 噪声级)
  lambda_lidar_depth: 0.1     # Stage 11 生效配方 (默认 0.03+decay=开了没用, lidar_psnr 仅 20.68)
  lidar_w_decay: 0            # 0 = 全程监督 (Stage 11: lidar_psnr 20.68→22.67, +2dB)
  lambda_bg_lidar: 0.005      # sky 远场 anchor 权重
  lambda_depth_prior: 0.01    # DepthV2 dense depth 权重
  lidar_depth_loss_type: l1   # l1 | l2 | smooth_l1
  depth_max: 80.0             # 深度有效范围上限 (m), normalize/clip 用

  # v2_full_4dviz_dynfix (T8/B3): bg-layer opacity 在 cuboid 内被压制,
  # 让 MCMC relocate 把死粒子转移到 donor, dyn 层接管 cuboid 内部.
  bg_dyn_cuboid_penalty:
    enabled: true
    lambda: 0.15                # dynfix 调强 (was 0.05) 压过 photometric pull
    lambda_warmup_iters: 1000   # dynfix 调短 (was 5000) bg 必须先撤出 cuboid
    use_cuboid_mask: true       # FTheta cuboid 投影填 image_infos["dyn_mask_cuboid"]
    dyn_clamp_to_cuboid: true   # LayeredMCMCStrategy._post_optimizer_step 把
                                # dynamic_rigids.positions 钳回 |local| ≤ size/2

  # V3-R2 — bg-in-road opacity penalty (active for road-takeover experiment).
  bg_road_penalty:
    enabled: true
    lambda: 0.1
    lambda_warmup_iters: 1000
    cell_size: 1.0
    z_band: 0.4

  # V3-R1.3 — road-layer effective rank reg.
  # ⚠ A/B 实测 null (5k/30k 方向翻转=纯噪声, 详见 v3_plan Done Log V3-R1).
  # ★ v3 baseline 剔除 (设回 0.0, 用户决策 2026-06-03), 不污染基线锚点.
  lambda_road_eff_rank: 0.0

# ─── 4D viz metadata 入 ckpt (源自 v2_full_4dviz.yaml) ─────────────────
viz_4d:
  enabled: true
  include_lidar: true
  lidar_road_subsample: 200000
  lidar_dynamic_subsample: 100000

# ─── strategy 微调 (源自 v2_full_4dviz_dynfix.yaml) ─────────────────────
# /strategy: layered_mcmc 已通过 defaults 加载, 此处只 override 单字段.
strategy:
  relocate:
    max_relocation_fraction: 0.4   # dynfix: 90% 死时 dyn 不会瞬间团聚
