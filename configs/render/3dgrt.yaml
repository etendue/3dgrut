method: 3dgrt # 3dgrt or 3dgut
  
pipeline_type: reference
backward_pipeline_type: ${render.pipeline_type}Bwd
particle_kernel_degree: 4
particle_kernel_density_clamping: true
particle_kernel_min_response: 0.0113
particle_kernel_min_alpha: ${div:1.0,255.0}
particle_kernel_max_alpha: 0.99
particle_radiance_sph_degree: 3
primitive_type: instances
min_transmittance: 0.001
max_consecutive_bvh_update: 15
enable_normals: false
enable_hitcounts: true
enable_kernel_timings: false

# T8.5.7: optional camera subset filter for render.py eval. When null,
# eval iterates all test-split cameras as before. Set to a list of
# camera_id strings (e.g. NCore "camera_front_wide_120fov") to restrict
# eval to a subset — used by V3-E4 to evaluate a 7-cam-trained ckpt on
# the 5-cam ring subset for byte-identical test-set comparison vs 5-cam
# baseline. Filter is applied in render_all() before per-frame work, so
# wall-clock scales linearly with retained frames.
eval_cameras: null

# V3-T15.2: optional DiFix (HuggingFace nvidia/Fixer) post-processing during
# render.py eval. Default off → metrics.json byte-identical with pre-T15.2.
# When ``use_difix=true``, render_all() computes ``mean_psnr_difix`` /
# ``mean_ssim_difix`` / ``mean_lpips_difix`` alongside the raw metrics by
# running pred_rgb through threedgrut/correction/difix.py::DifixPostProcessor.
# Requires the DiFix dep stack (cosmos_predict2 / imaginaire /
# transformer_engine / diffusers) and downloaded weights — see
# third_party/Fixer/INSTALL.md. NOT for the A800 3dgrut env; use Vast.ai or
# the cosmos-predict2 Docker container instead.
use_difix: false
difix_ckpt_path: null    # null → $HF_HOME/nvidia-Fixer/pretrained_fixer.pkl
difix_timestep: 250      # diffusion timestep (README CLI example value)
