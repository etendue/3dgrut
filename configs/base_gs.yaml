defaults:
  - _self_
  - /strategy: gs
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled

path: ???
seed_initialization: 42  # seed for rng in model initialization
experiment_name: ""
resume: ""
out_dir: "./runs"
n_iterations: 30000
with_gui: false
with_viser_gui: false
gui_update_from_device: true
val_frequency: 5000
num_workers: 24
use_wandb: false
wandb_project: "3dgrt"
test_last: true
validate_first: false
log_frequency: 1
compute_extra_metrics: true

enable_frame_timings: false

# v2 layered Gaussians (Stage 1+)
# Default v1-compatible: use_layered_model=false routes the trainer through a
# single MixtureOfGaussians. Set to true to build LayeredGaussians by reading
# layers.enabled (filtered against threedgrut.layers.registry.STANDARD_LAYERS).
use_layered_model: false
layers:
  enabled: [background]   # only consulted when use_layered_model=true

# T3.4: region-weighted L1 loss for layered training. When true AND the
# dataloader populates batch.image_infos (sky/road/dyn masks), L1 loss is
# partitioned per region and per-region means are summed (sky excluded;
# Stage 5 envmap takes over). SSIM stays full-image (D7). Default false
# leaves v1 byte-identical .mean() L1 in place.
# T5.4 / T5.5 sky envmap: when use_sky_envmap=true AND layers.enabled
# contains 'sky_envmap', LayeredGaussians blends a learned sky onto the
# Gauss render via (1 - pred_opacity) and get_losses adds a sky-region
# L1 weighted by lambda_sky. sky_backend ∈ {"cubemap", "mlp"} picks the
# nvdiffrast cubemap or the dependency-free MLP fallback. sky_lr is the
# Adam lr attached to the sky module (separate group from MoG opt).
# T6.1 / T6.2 exposure: per-camera affine exp(a)*x + b applied after sky
# blend, before the loss. Independent Adam at exposure_lr.
trainer:
  layered_loss: false
  use_sky_envmap: false
  # null = pick the registry spec default (cubemap, 128). Set to "mlp" /
  # explicit ints to override at the yaml level.
  sky_backend: null
  sky_resolution: null
  sky_lr: 0.01
  lambda_sky: 0.1
  use_exposure: false
  exposure_lr: 1.0e-3
  # T8/B3 — Background-layer opacity penalty + cuboid-aware dyn mask + dyn
  # position clamp. Default off so v2 baseline training byte-identical with
  # pre-B3 ckpts. Flip `enabled: true` in dynfix yaml (see
  # ncore_3dgut_mcmc_v2_full_4dviz_dynfix.yaml).
  bg_dyn_cuboid_penalty:
    enabled: false
    lambda: 0.05                # max penalty weight after warmup
    lambda_warmup_iters: 5000   # linear 0 → lambda over this many iters
    use_cuboid_mask: true       # fill image_infos["dyn_mask_cuboid"] for layered L1
    dyn_clamp_to_cuboid: false  # in-place dynamic_rigids positions clamp post-MCMC

  # V3 Stage A — per-track learnable cuboid pose (SE(3) refinement).
  # When enabled, LayeredGaussians registers wxyz quat Parameter[F,4] +
  # trans Parameter[F,3] per track instead of a frozen pose buffer; a
  # sibling independent Adam (init_pose_optimizer) updates them.
  # Default off → byte-identical with v2 / pre-V3 ckpts.
  # Lambda fields: Stage B temporal smoothness is now wired (trainer reads
  # both lambda_temporal_smooth_* fields via _compute_pose_smoothness_term);
  # pose-prior reg is still Stage C (placeholder, unused).
  learnable_pose:
    enabled: false
    lr_rotation:       1.0e-5          # DriveStudio omnire ins_rotation lr
    lr_translation:    1.0e-4          # 5x lower than omnire — 3dgrut2 main lr is smaller
    freeze_until_iter: 5000            # warmup: gaussians converge under GT pose first
    lambda_temporal_smooth_trans: 0.0  # Stage B (active when >0 ∧ step ≥ freeze)
    lambda_temporal_smooth_rot:   0.0  # Stage B (active when >0 ∧ step ≥ freeze)
    lambda_pose_prior_trans:      0.0  # Stage C placeholder (not yet read)
    lambda_pose_prior_rot:        0.0  # Stage C placeholder (not yet read)

enable_writer: true
writer:
  hit_stat_frequency: 999999
  max_num_hits: 128
  log_image_views: ${int_list:[ 0, 13, 27, 43, 78 ]}

export_ply:
  enabled: false
  path: ""
import_ply:
  enabled: false
  path: ""
  init_global_step: 0
  
export_usd:
  enabled: false
  path: ""
  apply_normalizing_transform: true
  format: standard  # "nurec" for Omniverse USDVol internal format, "standard" for USDVol ParticleField3DGaussianSplat
  half_precision: false
  export_cameras: true
  export_background: true
  sorting_mode_hint: cameraDistance

model:
  density_activation: sigmoid
  scale_activation: exp
  default_density: 0.1
  default_scale_factor: 1.0
  optimize_density: true
  optimize_features_albedo: true
  optimize_features_specular: true
  optimize_position: true
  optimize_rotation: true
  optimize_scale: true
  bvh_update_frequency: 1
  progressive_training:
    feature_type: "sh" # one of [sh, mlp], currently only sh supported
    init_n_features: 0 # sh: initial sh deg | mlp: num of dims initially unmasked
    max_n_features: 3 # sh: maximum sh deg | mlp: total num of dims finally unmasked
    increase_frequency: 1000 # unmask more feature dimensions every N global steps
    increase_step: 1 # sh: how many degrees unmasked per step | mlp: how many dims unmasked per step

  background:
    name: background-color # one of [skip-background, background-color]
    color: black # one of [black, white, random] needs to be defined if name == background-color

  print_stats: true

checkpoint:
  iterations: ${int_list:[ 7000, 30000 ]}

optimizer:
  type: adam # We only support adam and selective_adam for now
  lr: 0.0
  eps: 1.e-15
  params:
    positions:
      lr: 0.00016 # 3DGS value: 0.00016 initial and decayed to 0.0000016
    density:
      lr: 0.05 # 3DGS value: 0.05
    features_albedo:
      lr: 0.0025 # 3DGS value: 0.0025
    features_specular:
      lr: ${div:${optimizer.params.features_albedo.lr},20} # 3DGS value 20x smaller than lr of features_albedo
    rotation:
      lr: 0.001 # 3DGS value: 0.001
    scale:
      lr: 0.005 # 3DGS value: 0.005

scheduler:
  positions:
    # In the 3DGS paper they additionally have a parameter lr_delay_mult, but is is not being used so I drop it here
    type: exp
    lr_init: ${optimizer.params.positions.lr}
    lr_final: 0.0000016

    max_steps: 30000

  density:
    type: skip

loss:
  use_l1: true
  lambda_l1: 0.8
  
  use_l2: false
  lambda_l2: 1.0

  use_ssim: true
  lambda_ssim: 0.2

  use_opacity: false
  lambda_opacity: 0.0

  use_scale: false
  lambda_scale: 0.0

# Post-processing configuration
post_processing:
  method: null # Possible values: null, "ppisp"
  # Enable the controller for predicting per-frame corrections for novel views.
  # When false, zero corrections are used for novel views.
  use_controller: true
  # Number of extra distillation steps after main training (only for "ppisp").
  # When > 0, enables distillation mode: Gaussians and PPISP params are frozen,
  # only the controller is trained for these additional steps.
  n_distillation_steps: 5000

# T8.2: 4D viz metadata packed into ckpt['viz_4d'] for viser_gui_4d.
# enabled=false keeps ckpt byte-identical with pre-T8.2 layouts; flip in
# downstream configs (e.g. apps/ncore_3dgut_mcmc_v2_full_4dviz.yaml).
viz_4d:
  enabled: false
  include_lidar: true
  lidar_road_subsample: 200000
  # T8.11: dynamic LiDAR is stored per-track (object-local frame) so the
  # viewer can transform points back to world every frame, keeping them
  # glued to the moving cuboid. Cap is PER TRACK; legacy
  # lidar_dynamic_subsample (total) is kept as fallback in extract_4d_metadata.
  lidar_dynamic_pts_per_track: 5000
  lidar_dynamic_subsample: 100000   # legacy / fallback heuristic
  default_near: 0.1
  default_far: 500.0
  default_resolution: 1024

hydra:
  output_subdir: null
  job:
    chdir: false
  run:
    dir: .
