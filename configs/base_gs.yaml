defaults:
  - _self_
  - /strategy: gs
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled

path: ???
seed_initialization: 42  # seed for rng in model initialization
experiment_name: ""
resume: ""
out_dir: "./runs"
n_iterations: 30000
with_gui: false
with_viser_gui: false
gui_update_from_device: true
val_frequency: 5000
num_workers: 24
use_wandb: false
wandb_project: "3dgrt"
test_last: true
validate_first: false
log_frequency: 1
compute_extra_metrics: true

enable_frame_timings: false

# v2 layered Gaussians (Stage 1+)
# Default v1-compatible: use_layered_model=false routes the trainer through a
# single MixtureOfGaussians. Set to true to build LayeredGaussians by reading
# layers.enabled (filtered against threedgrut.layers.registry.STANDARD_LAYERS).
use_layered_model: false
layers:
  enabled: [background]   # only consulted when use_layered_model=true
  # MCRO B1: exclude road/sidewalk semantic LiDAR points from background
  # initialization. Default off preserves historical initialization.
  semantic_disjoint_init: false
  # MCRO B2: training-time hard background ownership exclusion. Pinhole GPU
  # path only; default off preserves all historical strategy behavior.
  bg_road_exclusion:
    enabled: false
    every_k_steps: 10
    cell_size: 1.0
    z_band: 0.4
    projection_max_height: 1.0
    chunk_size: 200000
    opacity_threshold: 0.005
    dead_density_raw: -50.0
    footprint_sigma: 2.0
    max_footprint_px: 48.0
    footprint_shrink_factor: 0.5
    # Repeated footprint-only hits must not underflow exp(log_scale) to zero;
    # zero activated scales poison the MCMC relocation inverse (log(0)).
    min_footprint_scale: 0.0001

# T3.4: region-weighted L1 loss for layered training. When true AND the
# dataloader populates batch.image_infos (sky/road/dyn masks), L1 loss is
# partitioned per region and per-region means are summed (sky excluded;
# Stage 5 envmap takes over). SSIM stays full-image (D7). Default false
# leaves v1 byte-identical .mean() L1 in place.
# T5.4 / T5.5 sky envmap: when use_sky_envmap=true AND layers.enabled
# contains 'sky_envmap', LayeredGaussians blends a learned sky onto the
# Gauss render via (1 - pred_opacity) and get_losses adds a sky-region
# L1 weighted by lambda_sky. sky_backend ∈ {"cubemap", "mlp"} picks the
# nvdiffrast cubemap or the dependency-free MLP fallback. sky_lr is the
# Adam lr attached to the sky module (separate group from MoG opt).
# T6.1 / T6.2 exposure: per-camera affine exp(a)*x + b applied after sky
# blend, before the loss. Independent Adam at exposure_lr.
trainer:
  # MCRO: default-off structured per-camera sampling/loss/gradient telemetry.
  # Enabled only for diagnostic A/B runs; false preserves the baseline path.
  per_camera_telemetry: false
  layered_loss: false
  use_sky_envmap: false
  # null = pick the registry spec default (cubemap, 128). Set to "mlp" /
  # explicit ints to override at the yaml level.
  sky_backend: null
  sky_resolution: null
  sky_lr: 0.01
  lambda_sky: 0.1
  use_exposure: false
  exposure_lr: 1.0e-3
  # T8/B3 — Background-layer opacity penalty + cuboid-aware dyn mask + dyn
  # position clamp. Default off so v2 baseline training byte-identical with
  # pre-B3 ckpts. Flip `enabled: true` in dynfix yaml (see
  # ncore_3dgut_mcmc_v2_full_4dviz_dynfix.yaml).
  bg_dyn_cuboid_penalty:
    enabled: false
    lambda: 0.05                # max penalty weight after warmup
    lambda_warmup_iters: 5000   # linear 0 → lambda over this many iters
    use_cuboid_mask: true       # fill image_infos["dyn_mask_cuboid"] for layered L1
    dyn_clamp_to_cuboid: false  # in-place dynamic_rigids positions clamp post-MCMC

  # V3-R2: bg-in-road opacity penalty. Penalizes opacity of background
  # particles on the road surface (BEV height field, |z-ground|<z_band) so
  # MCMC relocates them and the road layer takes over the road. enabled=false
  # = byte-identical with pre-V3-R2. lambda ramps 0->lambda over warmup.
  bg_road_penalty:
    enabled: false
    lambda: 0.1
    lambda_warmup_iters: 1000
    cell_size: 1.0
    z_band: 0.4

  # V3-R1.3: effective rank reg on road layer scales. Penalizes needle-
  # shaped Gaussians that overfit to a single training-camera direction
  # and break under novel-view +/-2m / +/-10deg perturbation. 0.0 = off
  # (v2 byte-identical). Typical: 0.005 - 0.02.
  lambda_road_eff_rank: 0.0

  # ──────────────────────────────────────────────────────────────────────
  # V3 pose_adjustment — user-facing alias for the per-track learnable
  # cuboid pose feature (Stage A SE(3) refinement + Stage B temporal
  # smoothness reg). Default disabled → byte-identical with v2 baseline.
  #
  # Recommended usage:
  #   trainer.pose_adjustment.enabled=true \
  #   trainer.pose_adjustment.lambda_t=1e-2 \
  #   trainer.pose_adjustment.lambda_r=1e-1
  #
  # Three knobs, that's all. Advanced tuning (lr_rotation, lr_translation,
  # freeze_until_iter, pose_prior lambdas) is still reachable through the
  # legacy ``trainer.learnable_pose.*`` keys below — they're kept as the
  # internal source of truth (ckpt schema uses ``learnable_pose_state``,
  # so renaming the implementation key would break backward compatibility).
  # ──────────────────────────────────────────────────────────────────────
  pose_adjustment:
    enabled: false   # toggle the whole feature; default off = v2 byte-identical
    lambda_t: 0.0    # temporal smoothness on translation (DriveStudio: ~1e-2)
    lambda_r: 0.0    # temporal smoothness on rotation    (DriveStudio: ~1e-1)

  # Internal implementation knobs. The 3 user-facing fields above forward
  # here via OmegaConf interpolation; advanced fields (lr_*, freeze_until_iter,
  # pose_prior_*) are still CLI-overridable on ``trainer.learnable_pose.*``.
  # Backward compat: a direct ``trainer.learnable_pose.enabled=true`` CLI
  # override still works — it replaces the interpolation with a literal.
  learnable_pose:
    enabled: ${trainer.pose_adjustment.enabled}                       # ⇐ user-facing alias
    lr_rotation:       1.0e-5          # DriveStudio omnire ins_rotation lr
    lr_translation:    1.0e-4          # 5x lower than omnire — 3dgrut2 main lr is smaller
    freeze_until_iter: 5000            # warmup: gaussians converge under GT pose first
    lambda_temporal_smooth_trans: ${trainer.pose_adjustment.lambda_t}  # ⇐ user-facing alias
    lambda_temporal_smooth_rot:   ${trainer.pose_adjustment.lambda_r}  # ⇐ user-facing alias
    # P1.2 fix_first/last — anchor each track's first + last *active* frame to
    # GT to kill the global-drift DOF behind the −0.61 cc regression. Master
    # toggle + per-component λ. Default OFF → reproduces Stage A exactly when
    # pose_adjustment.enabled=true; the poseopt app yaml turns it on.
    fix_first_last:               false
    lambda_pose_boundary_trans:   0.0
    lambda_pose_boundary_rot:     0.0
    # P1.2 pose prior — soft L2 of *all* active frames toward GT (now wired;
    # was a Stage C placeholder). Keep small relative to the boundary term.
    lambda_pose_prior_trans:      0.0
    lambda_pose_prior_rot:        0.0

enable_writer: true
writer:
  hit_stat_frequency: 999999
  max_num_hits: 128
  log_image_views: ${int_list:[ 0, 13, 27, 43, 78 ]}

export_ply:
  enabled: false
  path: ""
import_ply:
  enabled: false
  path: ""
  init_global_step: 0
  
export_usd:
  enabled: false
  path: ""
  apply_normalizing_transform: true
  format: standard  # "nurec" for Omniverse USDVol internal format, "standard" for USDVol ParticleField3DGaussianSplat
  half_precision: false
  export_cameras: true
  export_background: true
  sorting_mode_hint: cameraDistance

model:
  density_activation: sigmoid
  scale_activation: exp
  default_density: 0.1
  default_scale_factor: 1.0
  optimize_density: true
  optimize_features_albedo: true
  optimize_features_specular: true
  optimize_position: true
  optimize_rotation: true
  optimize_scale: true
  bvh_update_frequency: 1
  progressive_training:
    feature_type: "sh" # one of [sh, mlp], currently only sh supported
    init_n_features: 0 # sh: initial sh deg | mlp: num of dims initially unmasked
    max_n_features: 3 # sh: maximum sh deg | mlp: total num of dims finally unmasked
    increase_frequency: 1000 # unmask more feature dimensions every N global steps
    increase_step: 1 # sh: how many degrees unmasked per step | mlp: how many dims unmasked per step

  background:
    name: background-color # one of [skip-background, background-color]
    color: black # one of [black, white, random] needs to be defined if name == background-color

  print_stats: true

checkpoint:
  iterations: ${int_list:[ 7000, 30000 ]}

optimizer:
  type: adam # We only support adam and selective_adam for now
  lr: 0.0
  eps: 1.e-15
  params:
    positions:
      lr: 0.00016 # 3DGS value: 0.00016 initial and decayed to 0.0000016
    density:
      lr: 0.05 # 3DGS value: 0.05
    features_albedo:
      lr: 0.0025 # 3DGS value: 0.0025
    features_specular:
      lr: ${div:${optimizer.params.features_albedo.lr},20} # 3DGS value 20x smaller than lr of features_albedo
    rotation:
      lr: 0.001 # 3DGS value: 0.001
    scale:
      lr: 0.005 # 3DGS value: 0.005

scheduler:
  positions:
    # In the 3DGS paper they additionally have a parameter lr_delay_mult, but is is not being used so I drop it here
    type: exp
    lr_init: ${optimizer.params.positions.lr}
    lr_final: 0.0000016

    max_steps: 30000

  density:
    type: skip

loss:
  use_l1: true
  lambda_l1: 0.8
  
  use_l2: false
  lambda_l2: 1.0

  use_ssim: true
  lambda_ssim: 0.2

  use_opacity: false
  lambda_opacity: 0.0
  # Phase 2A: layer names exempted from the opacity L1 reg (lambda_opacity).
  # Default [] = byte-identical (reg over all particle layers). Setting e.g.
  # [road] stops lambda_opacity from starving under-supervised road particles
  # (which otherwise die -> get relocated/perturb-flung -> BEV surface holes).
  # Only consumed by LayeredGaussians.get_density_excluding (no-op for MoG).
  exempt_layers_opacity_reg: []

  use_scale: false
  lambda_scale: 0.0

  # C1 — per-camera photometric loss weight.
  # Maps camera_id → scale factor applied to L1 + SSIM (only the photometric
  # terms; opacity / scale / sky / lidar regs stay untouched). Default {} =
  # byte-identical to pre-C1 (Trainer3DGRUT._camera_loss_weight returns 1.0
  # for any lookup on an empty dict). CLI usage:
  #   ++loss.camera_loss_weights.camera_front_tele_30fov=4.0
  # A weight of 0.0 is legal (silences that camera's photometric supervision).
  camera_loss_weights: {}

# Post-processing configuration
post_processing:
  method: null # Possible values: null, "ppisp"
  # Enable the controller for predicting per-frame corrections for novel views.
  # When false, zero corrections are used for novel views.
  use_controller: true
  # Number of extra distillation steps after main training (only for "ppisp").
  # When > 0, enables distillation mode: Gaussians and PPISP params are frozen,
  # only the controller is trained for these additional steps.
  n_distillation_steps: 5000

# T8.2: 4D viz metadata packed into ckpt['viz_4d'] for viser_gui_4d.
# enabled=false keeps ckpt byte-identical with pre-T8.2 layouts; flip in
# downstream configs (e.g. apps/ncore_3dgut_mcmc_v2_full_4dviz.yaml).
viz_4d:
  enabled: false
  include_lidar: true
  lidar_road_subsample: 200000
  # T8.11: dynamic LiDAR is stored per-track (object-local frame) so the
  # viewer can transform points back to world every frame, keeping them
  # glued to the moving cuboid. Cap is PER TRACK; legacy
  # lidar_dynamic_subsample (total) is kept as fallback in extract_4d_metadata.
  lidar_dynamic_pts_per_track: 5000
  lidar_dynamic_subsample: 100000   # legacy / fallback heuristic
  default_near: 0.1
  default_far: 500.0
  default_resolution: 1024

hydra:
  output_subdir: null
  job:
    chdir: false
  run:
    dir: .
